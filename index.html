<!DOCTYPE html>
<html>
<head>
  <title>Base Daily Check</title>
</head>
<body>
  <h2>Base Daily Check-In</h2>
  <button onclick="connect()">Connect Wallet</button>
  <button onclick="checkIn()">Check In</button>

  <p id="status"></p>

  <script>
    let account = null;

    const contractAddress = "0xE8344363905fe2F03bE34b3Ae9fad591575Db3c5";

    // checkIn function selector (keccak("checkIn()") ilk 4 byte)
    const data = "0x183ff085";

    async function connect() {
      try {
        if (!window.ethereum) {
          alert("MetaMask yok");
          return;
        }

        const accounts = await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        account = accounts[0];

        // Base chain'e geç (chainId: 8453)
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0x2105" }]
        });

        document.getElementById("status").innerText = "Connected ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Connect error ❌";
      }
    }

    async function checkIn() {
      try {
        if (!account) {
          alert("Önce connect yap");
          return;
        }

        const tx = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{
            from: account,
            to: contractAddress,
            data: data
          }]
        });

        document.getElementById("status").innerText = "Tx gönderildi ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Tx error ❌";
      }
    }
  </script>
</body>
</html>
