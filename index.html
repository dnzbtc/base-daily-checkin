<!DOCTYPE html>
<html>
<head>
  <title>Base Daily Check</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.min.js"></script>
</head>
<body>
  <h2>Base Daily Check-In</h2>
  <button onclick="connect()">Connect Wallet</button>
  <button onclick="checkIn()">Check In</button>

  <p id="status"></p>

  <script>
    let signer;
    let provider;

    const contractAddress = "0xE8344363905fe2F03bE34b3Ae9fad591575Db3c5";

    const abi = [
      "function checkIn() public"
    ];

    async function connect() {
      try {
        if (!window.ethereum) {
          alert("MetaMask yok. Chrome + MetaMask kullan.");
          return;
        }

        provider = new ethers.BrowserProvider(window.ethereum);

        // hesap iste
        await window.ethereum.request({ method: "eth_requestAccounts" });

        signer = await provider.getSigner();

        // Base network kontrol (chainId: 8453)
        const network = await provider.getNetwork();
        if (Number(network.chainId) !== 8453) {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: "0x2105" }]
          });
        }

        document.getElementById("status").innerText = "Wallet connected ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Connect error ❌";
      }
    }

    async function checkIn() {
      try {
        if (!signer) {
          alert("Önce connect yap");
          return;
        }

        const contract = new ethers.Contract(contractAddress, abi, signer);

        const tx = await contract.checkIn();

        document.getElementById("status").innerText = "Tx gönderildi...";

        await tx.wait();

        document.getElementById("status").innerText = "Check-in başarılı ✅";
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Tx hata ❌";
      }
    }
  </script>
</body>
</html>
